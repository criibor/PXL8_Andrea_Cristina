<!DOCTYPE html>
<html>
<head>
	<title>PXL8</title>
	<meta charset="utf-8">
	<!-- Compiled w/ P5LIVE, http://github.com/ffd8/p5live -->
	<style type="text/css">
		body{
			margin:0;
			overflow:hidden;
		}
		canvas{
			position:fixed;
			top:0;
			left:0;
			z-index:-1;
			width:100vw;
			height:100vh;
			margin:0;
		}
	</style>
	<script type="text/javascript">
		// eco-mode = only render if window focused
		window.onblur = function () {
			noLoop();
		};
		window.onfocus = function () {
			loop();
		};
	</script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/p5@1/lib/p5.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/gh/processing/p5.js-sound/lib/p5.sound.min.js"></script>
</head>
<body style="background: rgb(0, 0, 0);">

<script type="text/javascript">
//finale_pixel_merged_011

/* CUSTOM FUNCTIONS FOR P5LIVE */
// keep fullscreen if window resized
function windowResized() {
	resizeCanvas(windowWidth, windowHeight);
}

// custom ease function
function ease(iVal, oVal, eVal){
	return oVal += (iVal - oVal) * eVal;
}

// processing compatibility
function println(msg){
	print(msg);
}




let img, grid
let cols, rows

// GUI-Elemente
let guiHolder, guiBar, guiContent
let sizeSlider, brightnessSlider, scaleSlider
let opacitySlider, colorSlider
let gapXSlider, gapYSlider
let modSliderX, modSliderY, modSliderZ
let checkbox, holder3d
let fileInput, uploadBtn
let shapeCheck
let animBtn, saveBtn, saveBtnGIF, resetBtn

// State
let useCircles = false
let animating  = false
let time       = 0
let interactingWithGUI = false


// ─────────────────────────────────────────────
//  GRID KLASSE
// ─────────────────────────────────────────────
class Grid {
  constructor() { this.sizes = [] }
  update(cols, rows) {
    this.sizes = []
    for (let i = 0; i < cols; i++) {
      this.sizes[i] = []
      for (let j = 0; j < rows; j++) {
        this.sizes[i][j] = 0
      }
    }
  }
  get(i, j) { return this.sizes[i][j] }
  set(i, j, val) { this.sizes[i][j] = val }
}


// ─────────────────────────────────────────────
//  SETUP
// ─────────────────────────────────────────────
function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL)
  colorMode(RGB)
  background(0)
  grid = new Grid()
  initGUI()
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight)
}


// ─────────────────────────────────────────────
//  DRAW
// ─────────────────────────────────────────────
function draw() {
  if (!img) { background(0); return }

  let is3D = checkbox.checked()

  background(0)

  // ── Slider-Werte ─────────────────────────────
  let pixelSize   = sizeSlider.value()          // Grösse jedes einzelnen Pixels
  let scaleFac    = scaleSlider.value() / 50    // Bild-Scale: 50 = 1:1
  let gapX        = gapXSlider.value()
  let gapY        = gapYSlider.value()
  let stepX       = pixelSize + gapX
  let stepY       = pixelSize + gapY
  let brightnessMax = brightnessSlider.value()
  let opacityVal  = opacitySlider.value()
  let colorShift  = colorSlider.value()

  // Bild-Dimensionen nach Scale
  let drawW = img.width  * scaleFac
  let drawH = img.height * scaleFac

  // Gitter
  cols = min(400, max(1, floor(drawW / stepX)))
  rows = min(400, max(1, floor(drawH / stepY)))
  grid.update(cols, rows)

  // Animation
  let autoScale = animating
    ? map(cos(frameCount * 0.08), -1, 1, pixelSize * 0.5, pixelSize * 2)
    : pixelSize
  if (animating) time += 0.02

  let animZ = animating ? sin(time * 0.8) * 0.5 : 0
  let tZ    = modSliderZ.value() / 100 + animZ

  // ── Farb-Helper ──────────────────────────────
  function getColor(c) {
    let h = (hue(c) + colorShift) % 360
    let s = saturation(c)
    let b = brightness(c)
    colorMode(HSB, 360, 100, 100, 255)
    let col = color(h, s, b, opacityVal)
    colorMode(RGB)
    return col
  }

  // ── 3D-Modus ─────────────────────────────────
  if (is3D) {
    if (!interactingWithGUI && mouseIsPressed) orbitControl(3, 3, 0)
    lights()
    noStroke()

    let cellW = drawW / cols
    let cellH = drawH / rows

    let animX = animating ? sin(time)       * 0.3 : 0
    let animY = animating ? sin(time * 1.2) * 0.3 : 0
    let tX = modSliderX.value() / 100 + animX
    let tY = modSliderY.value() / 100 + animY

    for (let i = 0; i < cols; i++) {
      for (let j = 0; j < rows; j++) {
        let imgX = floor(map(i, 0, cols, 0, img.width))
        let imgY = floor(map(j, 0, rows, 0, img.height))
        let c    = img.get(imgX, imgY)

        let sz = max(1, map(brightness(c), 0, brightnessMax, 0, autoScale, true))

        let baseZ = map(brightness(c), 0, 255, -400, 400)
        let wave  = sin(i * 0.3 + j * 0.3 + time) * 80
        let z     = (baseZ + wave) * tZ

        let w = lerp(cellW * 0.3, sz, tX)
        let h = lerp(cellH * 0.3, sz, tY)

        // Zentriert: Ursprung ist bereits canvas-Mitte in WEBGL
        let x3D = i * cellW - drawW / 2
        let y3D = j * cellH - drawH / 2

        push()
        translate(x3D + cellW / 2, y3D + cellH / 2, z)
        fill(getColor(c))
        noStroke()
        if (useCircles) {
          let depthScale = map(abs(z), 0, 500, 0.5, 1.5)
          ellipsoid(w * 0.5 * depthScale, h * 0.5 * depthScale, abs(z) * 0.25 + 5)
        } else {
          box(w, h, abs(z) * 0.5 + 10)
        }
        pop()
      }
    }

  // ── 2D-Modus ─────────────────────────────────
  } else {
    // WEBGL-Koordinaten: Mitte = (0,0)
    // Wir übersetzen so, dass das Bild-Raster zentriert ist
    camera()
    translate(-drawW / 2, -drawH / 2)
    noStroke()

    for (let i = 0; i < cols; i++) {
      for (let j = 0; j < rows; j++) {
        let imgX = floor(map(i, 0, cols, 0, img.width))
        let imgY = floor(map(j, 0, rows, 0, img.height))
        let c    = img.get(imgX, imgY)

        let finalSize = max(0, map(brightness(c), 0, brightnessMax, 0, autoScale, true))
        grid.set(i, j, finalSize)

        fill(getColor(c))

        let x = i * stepX + (pixelSize - finalSize) / 2
        let y = j * stepY + (pixelSize - finalSize) / 2

        if (useCircles) {
          ellipse(x + finalSize / 2, y + finalSize / 2, finalSize, finalSize)
        } else {
          rect(x, y, finalSize, finalSize)
        }
      }
    }
  }
}


// ─────────────────────────────────────────────
//  RESET
// ─────────────────────────────────────────────
function resetAll() {
  sizeSlider.value(10)
  brightnessSlider.value(1)
  scaleSlider.value(50)
  opacitySlider.value(255)
  colorSlider.value(0)
  gapXSlider.value(0)
  gapYSlider.value(0)
  modSliderX.value(50)
  modSliderY.value(50)
  modSliderZ.value(50)
  useCircles = false
  animating  = false
  shapeCheck.checked(false)
  animBtn.html('▶ Play')
  checkbox.checked(false)
  holder3d.hide()
  resizeCanvas(windowWidth, windowHeight)
}


// ─────────────────────────────────────────────
//  GUI
// ─────────────────────────────────────────────
function initGUI() {
  guiHolder = createDiv('').class('guiHolder')

  guiBar = createDiv('PXL8')
    .class('guiBar')
    .draggable(guiHolder)
    .parent(guiHolder)

  guiContent = createDiv('').class('guiContent').parent(guiHolder)

  guiHolder.mouseOver(() => interactingWithGUI = true)
  guiHolder.mouseOut(()  => interactingWithGUI = false)

  // ── Bild-Upload ──────────────────────────────
  fileInput = createFileInput(file => {
    if (file.type === 'image') {
      loadImage(file.data, loaded => {
        img = loaded
        scaleSlider.value(50)   // 1:1 Originalgrösse beim Upload
      })
    }
  }).parent(guiContent)
  fileInput.hide()

  uploadBtn = createButton('New Image')
    .parent(guiContent)
    .mousePressed(() => fileInput.elt.click())

  // ── Sliders ──────────────────────────────────
  addSlider('PIXEL SIZE',   4,   80,  10,  1, v => sizeSlider       = v)
  addSlider('BRIGHTNESS',   1,  100,   1,  1, v => brightnessSlider  = v)
  addSlider('SCALE',        1,  100,  50,  1, v => scaleSlider       = v)
  addSlider('OPACITY',      0,  255, 255,  1, v => opacitySlider     = v)
  addSlider('COLOR SHIFT',  0,  360,   0,  1, v => colorSlider       = v)
  addSlider('GAP X',        0,   40,   0,  1, v => gapXSlider        = v)
  addSlider('GAP Y',        0,   40,   0,  1, v => gapYSlider        = v)

  // ── 3D-Toggle + Depth ────────────────────────
  checkbox = createCheckbox('3D', false)
    .class('label')
    .parent(guiContent)
    .input(function() {
      if (checkbox.checked()) {
        holder3d.show()
      } else {
        holder3d.hide()
      }
    })

  holder3d = createDiv('').parent(guiContent).class('holder3d').hide()
  createDiv('PIXEL SIZE X').class('label').parent(holder3d)
  modSliderX = createSlider(0, 100, 50, 1).parent(holder3d)
  modSliderX.style('width', '100%')
  createDiv('PIXEL SIZE Y').class('label').parent(holder3d)
  modSliderY = createSlider(0, 100, 50, 1).parent(holder3d)
  modSliderY.style('width', '100%')
  createDiv('DEPTH').class('label').parent(holder3d)
  modSliderZ = createSlider(0, 100, 50, 1).parent(holder3d)
  modSliderZ.style('width', '100%')

  // ── Buttons ──────────────────────────────────
  shapeCheck = createCheckbox('Circles', false)
    .class('label')
    .parent(guiContent)
    .input(function() { useCircles = shapeCheck.checked() })

  animBtn = createButton('▶ Play')
    .parent(guiContent)
    .mousePressed(() => {
      animating = !animating
      animBtn.html(animating ? '■ Stop' : '▶ Play')
    })

  saveBtn = createButton('Save PNG')
    .parent(guiContent)
    .mousePressed(() => save('pxl8.png'))

  saveBtnGIF = createButton('Save GIF')
    .parent(guiContent)
    .mousePressed(() => saveGif('pixel8_anim', 5))

  resetBtn = createButton('Reset')
    .parent(guiContent)
    .mousePressed(resetAll)

  // ── CSS ──────────────────────────────────────
  createElement('style', `
    .guiHolder {
      position: fixed;
      top: 25px;
      left: 25px;
      width: 200px;
      background: rgba(0,0,0,.55);
      border-radius: 12px;
      user-select: none;
      overflow: hidden;
      z-index: 9999;
    }
    .guiBar {
      text-align: center;
      padding: 7px;
      color: #fff;
      font-family: sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      cursor: grab;
    }
    .guiContent {
      border-top: 1px solid rgba(255,255,255,.25);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 85vh;
      overflow-y: auto;
    }
    .label {
      color: #fff;
      font-family: sans-serif;
      font-size: 10px;
      padding: 2px 0;
      letter-spacing: 1px;
    }
    .holder3d {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    input[type=range] { width: 100%; }
    button {
      width: 100%;
      margin-top: 2px;
      padding: 5px;
      background: rgba(255,255,255,.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 5px;
      font-family: sans-serif;
      font-size: 11px;
      cursor: pointer;
    }
    button:hover { background: rgba(255,255,255,.25); }
  `)
}

// Helper: Slider mit Label
function addSlider(label, min, max, val, step, assign) {
  createDiv(label).class('label').parent(guiContent)
  let sl = createSlider(min, max, val, step).parent(guiContent)
  sl.style('width', '100%')
  assign(sl)
}

</script>

</body>
</html>
